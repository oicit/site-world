<!-- st:meta
name: narrative-parallax
purpose: Depth band — 2–3 knocked-out layers (bg / mid / fg) drift at different
  speeds while a statement sits over them. Pairs with scroll-world's
  knockout.py output. Use as a breather between dense sections.
interaction: rAF parallax on transform only, scoped to the band's viewport
  span; off under reduced-motion.
mobile: speeds halved; layers stay (cheap — transforms only).
source: site-world S0
-->
<section class="st-parallax">
  <style>
    .st-parallax{position:relative;min-height:92svh;overflow:clip;display:grid;
      place-items:center;background:var(--st-surface-2)}
    .st-parallax .layer{position:absolute;inset:-12% 0;pointer-events:none;will-change:transform}
    .st-parallax .layer img{width:100%;height:100%;object-fit:cover}
    .st-parallax .statement{position:relative;z-index:3;text-align:center;padding:0 var(--st-pad)}
    .st-parallax .statement h2{font-family:var(--st-font-display);font-size:var(--st-h1);
      line-height:1.04;margin:0;max-width:18ch;overflow-wrap:anywhere}
    .st-parallax .statement h2 em{font-style:normal;color:var(--st-accent)}
    /* placeholder art (replace .ph layers with knocked-out images) */
    .st-parallax .ph{position:absolute;border-radius:50%}
  </style>
  <div class="layer" data-speed="0.15">
    <div class="ph" style="width:38vw;height:38vw;left:6%;top:12%;background:var(--st-accent);opacity:.9"></div>
  </div>
  <div class="layer" data-speed="0.35">
    <div class="ph" style="width:20vw;height:20vw;right:10%;top:30%;background:var(--st-accent-2)"></div>
  </div>
  <div class="statement st-reveal">
    <h2>PARALLAX_STATEMENT with an <em>emphasis</em>.</h2>
  </div>
  <script>
    (function () {
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const s = document.currentScript.closest('section');
      const layers = [...s.querySelectorAll('.layer')];
      const mobile = matchMedia('(max-width: 820px)');
      let ticking = false;
      function frame() {
        const r = s.getBoundingClientRect();
        const p = (r.top + r.height / 2 - innerHeight / 2) ;   // px from viewport centre
        const k = mobile.matches ? 0.5 : 1;
        layers.forEach(l => {
          l.style.transform = `translate3d(0, ${(-p * l.dataset.speed * k).toFixed(1)}px, 0)`;
        });
        ticking = false;
      }
      addEventListener('scroll', () => {
        if (!ticking) { ticking = true; requestAnimationFrame(frame); }
      }, { passive: true });
      frame();
    })();
  </script>
</section>
