<!-- st:meta
name: narrative-pin-steps
purpose: Scrollytelling — sticky visual on the right, step copy scrolls past on
  the left; the visual swaps per step. For "how it works", process stories,
  before/after narratives.
interaction: CSS position:sticky (no scroll hijack); IntersectionObserver
  activates the step + its matching visual.
mobile: single column; visuals inline under each step (sticky off).
source: site-world S0
-->
<section class="st-pin-steps">
  <style>
    .st-pin-steps .grid{display:grid;grid-template-columns:1fr 1.1fr;gap:4rem}
    .st-pin-steps .steps{display:grid;gap:38vh;padding-block:12vh}
    .st-pin-steps .step h3{font-family:var(--st-font-display);font-size:var(--st-h2);
      line-height:1.08;margin:0 0 .8rem}
    .st-pin-steps .step .num{font-family:var(--st-font-mono);font-weight:700;
      font-size:var(--st-fine);color:var(--st-accent)}
    .st-pin-steps .step p{color:var(--st-ink-2);max-width:40ch;margin:0}
    .st-pin-steps .stage{position:sticky;top:12vh;height:76vh;border-radius:var(--st-radius);
      overflow:clip;box-shadow:var(--st-shadow)}
    .st-pin-steps .stage-wrap{align-self:start;position:relative}
    .st-pin-steps .visual{position:absolute;inset:0;opacity:0;transform:scale(1.04);
      transition:opacity .6s var(--st-ease),transform .6s var(--st-ease)}
    .st-pin-steps .visual.is-on{opacity:1;transform:none}
    .st-pin-steps .visual img{width:100%;height:100%;object-fit:cover}
    .st-pin-steps .visual .ph{width:100%;height:100%;display:grid;place-items:center;
      font-family:var(--st-font-display);font-size:2rem;color:var(--st-ink-inv)}
    @media (max-width:880px){
      .st-pin-steps .grid{grid-template-columns:1fr}
      .st-pin-steps .stage-wrap{display:none}
      .st-pin-steps .steps{gap:3.5rem;padding-block:0}
      .st-pin-steps .step .m-visual{display:block;margin-top:1.2rem;border-radius:var(--st-radius);overflow:clip}
    }
    @media (min-width:881px){.st-pin-steps .step .m-visual{display:none}}
    @media (prefers-reduced-motion:reduce){.st-pin-steps .visual{transition:none}}
  </style>
  <div class="st-wrap grid">
    <div class="steps">
      <!-- one .step per beat; data-visual links to the stage layer -->
      <div class="step" data-visual="v1">
        <span class="num">01</span><h3>STEP_1_TITLE</h3><p>STEP_1_BODY</p>
        <div class="m-visual"><div class="ph" style="background:var(--st-accent);aspect-ratio:4/3"></div></div>
      </div>
      <div class="step" data-visual="v2">
        <span class="num">02</span><h3>STEP_2_TITLE</h3><p>STEP_2_BODY</p>
        <div class="m-visual"><div class="ph" style="background:var(--st-accent-2);aspect-ratio:4/3"></div></div>
      </div>
      <div class="step" data-visual="v3">
        <span class="num">03</span><h3>STEP_3_TITLE</h3><p>STEP_3_BODY</p>
        <div class="m-visual"><div class="ph" style="background:var(--st-ink);aspect-ratio:4/3"></div></div>
      </div>
    </div>
    <div class="stage-wrap">
      <div class="stage">
        <!-- replace .ph with <img>; ids must match data-visual -->
        <div class="visual is-on" id="v1"><div class="ph" style="background:var(--st-accent)">VISUAL_1</div></div>
        <div class="visual" id="v2"><div class="ph" style="background:var(--st-accent-2)">VISUAL_2</div></div>
        <div class="visual" id="v3"><div class="ph" style="background:var(--st-ink)">VISUAL_3</div></div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const s = document.currentScript.closest('section');
      const io = new IntersectionObserver(es => es.forEach(e => {
        if (!e.isIntersecting) return;
        const id = e.target.dataset.visual;
        s.querySelectorAll('.visual').forEach(v => v.classList.toggle('is-on', v.id === id));
      }), { rootMargin: '-45% 0px -45% 0px' });
      s.querySelectorAll('.step').forEach(n => io.observe(n));
    })();
  </script>
</section>
